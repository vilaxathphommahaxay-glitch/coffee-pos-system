name: mobile_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ⭐ แก้ให้แล้วครับ (ลบไฟล์ตัวอย่างออก เหลือแค่ไฟล์จริง)
  assets:
    - assets/sumday.jpeg
  # ⭐ เพิ่มตรงนี้ต่อท้าย (ย่อหน้าให้ตรงกับ assets ด้านบน)
  fonts:
    - family: MyShopFont  # ตั้งชื่อเล่นให้ฟอนต์ (จะเอาไปใช้ในโค้ด)
      fonts:
        - asset: assets/fonts/avenir-next-heavy.ttf  # 👈 ใส่ชื่อไฟล์ฟอนต์ของคุณให้ถูกเป๊ะๆ