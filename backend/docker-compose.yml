version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: pos_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_super_password
      MYSQL_DATABASE: coffee_pos_db
      MYSQL_USER: pos_admin
      MYSQL_PASSWORD: pos_SecurePass99!
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
